name: CI Pipeline

on:
push:
branches: [dev]

pull_request:
branches: [prod]

jobs:
ci:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install Dependencies
    run: npm install

  - name: Lint Check
    run: npm run lint

  - name: Run Tests
    run: npm test

  - name: Snyk Security Scan
    uses: snyk/actions/node@master
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  - name: Build Project
    run: npm run build

