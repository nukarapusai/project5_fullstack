name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "infra/**"
      - "cdk.json"
      - ".github/iam/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2
  ECR_REPO: project5-backend
  CDK_QUALIFIER: p5fullstck

concurrency:
  group: backend-cicd-master
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Run Tests
        run: cd backend && npm test -- --coverage

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK Environment
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cd infra
          npm ci
          npx cdk bootstrap aws://$ACCOUNT_ID/${{ env.AWS_REGION }} --qualifier ${{ env.CDK_QUALIFIER }} --require-approval never

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t ${{ env.ECR_REPO }} ./backend

      - name: Push Image to ECR
        run: |
          docker tag ${{ env.ECR_REPO }}:latest ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Wait For BackendStack To Be Ready
        run: |
          set -e
          for i in {1..40}; do
            status=$(aws cloudformation describe-stacks --stack-name BackendStack --region ${{ env.AWS_REGION }} --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "STACK_NOT_FOUND")
            echo "BackendStack status: $status"
            case "$status" in
              *_IN_PROGRESS)
                echo "BackendStack is busy, waiting 30s..."
                sleep 30
                ;;
              STACK_NOT_FOUND|CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|ROLLBACK_COMPLETE)
                echo "BackendStack is ready for deployment"
                break
                ;;
              *)
                echo "BackendStack is in unexpected state: $status"
                exit 1
                ;;
            esac

            if [ "$i" -eq 40 ]; then
              echo "Timed out waiting for BackendStack to become ready"
              exit 1
            fi
          done

      - name: Deploy Infrastructure with CDK
        run: |
          cd infra
          npm ci
          npx cdk deploy NetworkStack BackendStack FrontendStack --qualifier ${{ env.CDK_QUALIFIER }} --require-approval never --concurrency 1