name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2
  ECR_REPO: project5-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: cd backend && npm install

      - name: Run Tests
        run: cd backend && npm test -- --coverage

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t ${{ env.ECR_REPO }} ./backend

      - name: Push Image to ECR
        run: |
          docker tag ${{ env.ECR_REPO }}:latest ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Deploy Infrastructure with CDK
        run: |
          cd infra
          npm install
          npx cdk deploy --all --require-approval never